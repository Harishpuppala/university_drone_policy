<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>University Drone Policy Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>University Drone Policy Generator</h1>

<p>Select your university to generate a UAV policy document.</p>

<label>Search University</label>

<input type="text" id="searchBox" placeholder="Type university name..." onkeyup="filterColleges()">

<br><br>

<select id="collegeDropdown" size="10" style="width:500px;"></select>

<br><br>

<button onclick="downloadPDF()">Generate Policy PDF</button>

<script src="script.js"></script>

</body>

</html>
