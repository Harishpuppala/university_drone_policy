<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>University Drone Policy Generator</title>

<link rel="stylesheet" href="style.css">

<!-- Searchable Dropdown Library -->
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<!-- PDF Generator -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>University Drone Policy Generator</h1>

<p>Select your university to generate a UAV policy document.</p>

<label for="collegeDropdown">University / Institute</label>

<select id="collegeDropdown" placeholder="Type to search university..."></select>

<br><br>

<button onclick="downloadPDF()">Generate Policy PDF</button>

<br><br>

<div id="status"></div>

<script src="script.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

new TomSelect("#collegeDropdown",{
create:false,
sortField:"text",
placeholder:"Type university name to search..."
});

});

</script>

</body>

</html>
